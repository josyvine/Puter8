<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manual Web Browser</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* sleeker navigation bar in dark layout to contrast with live webpages */
    header {
      background: #333;
      color: #fff;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      z-index: 100;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .nav-controls-left {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 6px;
    }

    .address-bar-wrapper {
      display: flex;
      align-items: center;
      flex: 1;
      background: #fff;
      border-radius: 20px;
      padding: 4px 12px;
      height: 38px;
      max-width: 600px;
    }

    .address-bar-wrapper input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: #333;
      background: transparent;
    }

    .go-btn {
      background: none;
      border: none;
      color: #1a73e8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .nav-controls-right {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 10px;
    }

    .action-icon-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .action-icon-btn:active {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .action-icon-btn span {
      font-size: 22px;
    }

    .exit-btn {
      color: #f4f4f4;
      background-color: #d93025;
      border-radius: 18px;
      padding: 0 12px;
      height: 36px;
      font-weight: bold;
      font-size: 13px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background-color 0.2s;
    }

    .exit-btn:active {
      background-color: #b52218;
    }

    /* Core Viewport Container */
    .viewport-container {
      flex: 1;
      width: 100%;
      position: relative;
      background: #fff;
    }

    #browserViewport {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Placeholder Screen shown before browsing */
    .browser-placeholder {
      position: absolute;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      z-index: 10;
    }

    .placeholder-logo {
      font-size: 64px;
      color: #1a73e8;
      margin-bottom: 12px;
    }

    .placeholder-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .placeholder-desc {
      font-size: 13px;
      color: #666;
      max-width: 280px;
      line-height: 1.5;
    }

    /* DYNAMIC FLOATING ACTION BUTTON WITH STATE COLORS */
    .scrape-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background-color: #1a73e8;
      color: #fff;
      border: none;
      box-shadow: 0 4px 10px rgba(26,115,232,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
      transition: transform 0.2s, background-color 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
    }

    .scrape-fab:active {
      transform: scale(0.9);
    }

    .scrape-fab span {
      font-size: 26px;
      font-variation-settings: 'FILL' 1;
    }

    /* Dynamic FAB Color Overrides based on execution cycle */
    .scrape-fab.state-scraping {
      background-color: #d93025 !important; /* RED - Scraping initiated */
      box-shadow: 0 4px 10px rgba(217,48,37,0.4) !important;
    }

    .scrape-fab.state-processing {
      background-color: #f2994a !important; /* ORANGE - Intermediate processing */
      box-shadow: 0 4px 10px rgba(242,153,74,0.4) !important;
    }

    .scrape-fab.state-finished {
      background-color: #27ae60 !important; /* GREEN - Scrape completed and sent */
      box-shadow: 0 4px 10px rgba(39,174,96,0.4) !important;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-controls-left">
      <!-- EXIT TO CHAT BUTTON -->
      <button class="exit-btn" onclick="exitBrowser()">
        <span class="material-symbols-outlined" style="font-size: 18px;">chat</span> Exit
      </button>

      <!-- ADDRESS BAR INPUT -->
      <div class="address-bar-wrapper">
        <input type="text" id="addressInput" placeholder="Enter web address or search..." onkeydown="handleAddressKey(event)">
        <button class="go-btn" onclick="navigateAddress()">
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>

    <!-- PHYSICAL NAVIGATION CONTROLS -->
    <div class="nav-controls-right">
      <button class="action-icon-btn" onclick="goBack()" title="Back">
        <span class="material-symbols-outlined">arrow_back_ios</span>
      </button>
      <button class="action-icon-btn" onclick="goForward()" title="Forward">
        <span class="material-symbols-outlined">arrow_forward_ios</span>
      </button>
      <button class="action-icon-btn" onclick="reloadPage()" title="Reload">
        <span class="material-symbols-outlined">refresh</span>
      </button>
    </div>
  </header>

  <div class="viewport-container">
    <!-- Viewport rendering iframe -->
    <iframe id="browserViewport" name="browserViewport" src="about:blank" onload="onViewportLoad()"></iframe>

    <!-- Initial Landing Placeholder -->
    <div class="browser-placeholder" id="browserPlaceholder">
      <span class="material-symbols-outlined placeholder-logo">travel_explore</span>
      <div class="placeholder-title">Web Exploration Viewport</div>
      <div class="placeholder-desc">Enter an address in the search bar above to manually browse, extract, and catalog web pages.</div>
    </div>
  </div>

  <!-- FLOATING ACTION BUTTON OVERLAY -->
  <button class="scrape-fab" onclick="triggerWebScrape()" title="Scrape Web">
    <span class="material-symbols-outlined">target</span>
  </button>

  <script>
    let currentActiveUrl = "";
    let scrapeTimeout = null;
    let scrapeWatchdog = null; // NEW: Diagnostic watchdog timer

    // --- TOTAL SURVEILLANCE: GLOBAL EXCEPTION INTERCEPTORS ---
    window.onerror = function(message, source, lineno, colno, error) {
        if (window.AndroidInterface && window.AndroidInterface.logHtmlGlitch) {
            const stack = error ? error.stack : "No stack trace available";
            const details = "Error: " + message + "\nSource: " + source + " at line " + lineno + ":" + colno + "\nStack:\n" + stack;
            window.AndroidInterface.logHtmlGlitch("browser.html", details);
        }
        return false; // Propagate to browser normally
    };

    window.onunhandledrejection = function(event) {
        if (window.AndroidInterface && window.AndroidInterface.logHtmlGlitch) {
            const reason = event.reason ? (event.reason.stack || event.reason) : "No rejection reason";
            window.AndroidInterface.logHtmlGlitch("browser.html", "Unhandled Promise Rejection:\n" + reason);
        }
    };

    function onViewportLoad() {
        try {
            const iframe = document.getElementById('browserViewport');
            if (iframe.contentWindow && iframe.contentWindow.location.href !== "about:blank") {
                currentActiveUrl = iframe.contentWindow.location.href;
                document.getElementById('addressInput').value = currentActiveUrl;
                document.getElementById('browserPlaceholder').style.display = 'none';
            }
        } catch (e) {
            // Origin security prevents direct iframe URL extraction, we rely on address input
            console.log("Cross-origin protection active. Tracking navigation via address inputs.");
        }
    }

    function navigateAddress() {
        const input = document.getElementById('addressInput');
        let url = input.value.trim();
        if (!url) return;

        // Auto-fix missing protocol wrappers
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            url = "https://" + url;
        }

        currentActiveUrl = url;
        input.value = url;
        document.getElementById('browserPlaceholder').style.display = 'none';
        
        // Load target webpage inside iframe container
        document.getElementById('browserViewport').src = url;
    }

    function handleAddressKey(event) {
        if (event.key === "Enter") {
            navigateAddress();
        }
    }

    function goBack() {
        try {
            const iframe = document.getElementById('browserViewport');
            iframe.contentWindow.history.back();
        } catch (e) {
            // Native fallback if frame sandbox blocks history
            if (window.AndroidInterface && window.AndroidInterface.nativeLog) {
                window.AndroidInterface.nativeLog("Iframe Back navigation blocked. Relying on physical back button.", "warn");
            }
        }
    }

    function goForward() {
        try {
            const iframe = document.getElementById('browserViewport');
            iframe.contentWindow.history.forward();
        } catch (e) {
            console.log("Iframe Forward navigation restricted.");
        }
    }

    function reloadPage() {
        try {
            const iframe = document.getElementById('browserViewport');
            iframe.contentWindow.location.reload();
        } catch (e) {
            // Reload trigger
            document.getElementById('browserViewport').src = currentActiveUrl;
        }
    }

    function exitBrowser() {
        if (window.AndroidInterface && window.AndroidInterface.loadLocalUrl) {
            window.AndroidInterface.loadLocalUrl('index.html');
        } else {
            window.location.href = 'index.html';
        }
    }

    /**
     * DYNAMIC FLOATING ACTION OVERLAY ROUTING ENGINE
     * Performs domain detection:
     * - If Amazon: Redirects the viewport frame to scraper.html command dashboard.
     * - If Universal: Executes silent background scrape and saves payload.
     * ENHANCEMENT: Includes dynamic color state changes for Universal Mode scraping cycles.
     * SURVEILLANCE: Implements an 8-second diagnostic watchdog to intercept infinite orange hangs.
     */
    function triggerWebScrape() {
        const activeUrl = currentActiveUrl || document.getElementById('addressInput').value.trim();
        
        if (!activeUrl || activeUrl.startsWith("about:blank")) {
            alert("Navigate to a webpage first before scraping.");
            return;
        }

        if (window.AndroidInterface && window.AndroidInterface.nativeLog) {
            window.AndroidInterface.nativeLog("Routing active domain target: " + activeUrl, "native");
        }

        if (activeUrl.includes("amazon.in") || activeUrl.includes("amazon.com")) {
            // E-Commerce Route: Navigates viewport to scraper.html command panel
            if (window.AndroidInterface && window.AndroidInterface.loadLocalUrl) {
                window.AndroidInterface.loadLocalUrl('scraper.html');
            } else {
                window.location.href = 'scraper.html';
            }
        } else {
            // Universal Mode: Inject scraper and trigger silent background parse
            const fab = document.querySelector('.scrape-fab');
            
            // 1. Instantly transition to Scraping state (RED)
            fab.className = 'scrape-fab state-scraping';

            // 2. Set timeout to transition to intermediate Processing state (ORANGE) after 1.2 seconds
            if (scrapeTimeout) clearTimeout(scrapeTimeout);
            scrapeTimeout = setTimeout(() => {
                fab.className = 'scrape-fab state-processing';
            }, 1200);

            // 3. START DIAGNOSTIC WATCHDOG TIMER (8-seconds limit)
            if (scrapeWatchdog) clearTimeout(scrapeWatchdog);
            scrapeWatchdog = setTimeout(() => {
                // Clear any pending transition timers
                if (scrapeTimeout) clearTimeout(scrapeTimeout);

                if (window.AndroidInterface && window.AndroidInterface.reportGlitchedLogic) {
                    window.AndroidInterface.reportGlitchedLogic(
                        "SCRAPE_TIMEOUT", 
                        "Universal content script failed to respond within 8 seconds. Viewport URL: " + activeUrl
                    );
                }
                
                // Force-transition back to RED (Error State) to visually denote failure
                fab.className = 'scrape-fab state-scraping';
                
                if (window.AndroidInterface && window.AndroidInterface.showToast) {
                    window.AndroidInterface.showToast("Scraping failed: Iframe or Script Timeout.");
                } else {
                    alert("Scraping failed: Iframe or Script Timeout.");
                }

                // Revert to Blue after 4 seconds
                setTimeout(() => {
                    fab.className = 'scrape-fab';
                }, 4000);

            }, 8000);

            const iframe = document.getElementById('browserViewport');
            try {
                // If same origin, execute script directly
                iframe.contentWindow.postMessage({ action: "scrape_universal" }, "*");
            } catch (e) {
                // For cross-origin pages, WebViewClient automatically injects universal_scraper.js onPageFinished.
                // We send a programmatic postMessage to trigger the save.
                iframe.contentWindow.postMessage("scrape", "*");
            }
        }
    }

    // Capture postMessages from universal_scraper content script inside the frame
    window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "scraped_data_callback") {
            const payload = event.data.payload;
            if (window.AndroidInterface && window.AndroidInterface.addScrapedProduct) {
                window.AndroidInterface.addScrapedProduct(payload.scraped_id, JSON.stringify(payload));
                
                // Clear active progress and watchdog timers immediately
                if (scrapeTimeout) clearTimeout(scrapeTimeout);
                if (scrapeWatchdog) clearTimeout(scrapeWatchdog);

                const fab = document.querySelector('.scrape-fab');
                
                // 3. Transition to Finished state (GREEN) on success callback
                fab.className = 'scrape-fab state-finished';

                // 4. Trigger native Android Toast message
                if (window.AndroidInterface.showToast) {
                    window.AndroidInterface.showToast("JSON sent successfully to Puter Unofficial");
                } else {
                    alert("Successfully saved page: " + payload.metadata.title);
                }

                // 5. Smoothly revert back to original Blue state after 4 seconds
                setTimeout(() => {
                    fab.className = 'scrape-fab';
                }, 4000);
            }
        }
    });
  </script>
</body>
</html>
